# Podman users on Fedora/RHEL with SELinux enforcing:
# Add :Z to the postgres volume mount:
#   volumes:
#     - pgdata:/var/lib/postgresql/data:Z

services:
  app:
    image: docker.io/iuliandita/digarr:0.26
    # Pin to a patch version for full stability:
    # image: docker.io/iuliandita/digarr:0.26.7
    # Alpine variant (smaller image, musl libc):
    # image: docker.io/iuliandita/digarr:0.26.7-alpine
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-digarr}:${DB_PASS:?DB_PASS is required -- set it in .env}@postgres:5432/${DB_NAME:-digarr}
      - PORT=3000
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'bun -e "fetch(''http://localhost:3000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    read_only: true
    volumes:
      - backups:/app/backups
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    env_file:
      - path: .env
        required: false
    environment:
      - POSTGRES_USER=${DB_USER:-digarr}
      - POSTGRES_PASSWORD=${DB_PASS:?DB_PASS is required -- set it in .env}
      - POSTGRES_DB=${DB_NAME:-digarr}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-digarr}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  pgdata:
  backups:
