# Podman users on Fedora/RHEL with SELinux enforcing:
# Add :Z to the postgres volume mount:
#   volumes:
#     - pgdata:/var/lib/postgresql/data:Z

secrets:
  postgres_password:
    file: ./secrets/postgres_password
  database_url:
    file: ./secrets/database_url

networks:
  frontend:
  backend:
    internal: true

services:
  app:
    image: docker.io/iuliandita/digarr:stable
    # Channels:
    #   :stable -> last release promoted after >= 7 days with no follow-up patch (recommended for self-hosters)
    #   :latest -> head of the release line, may move multiple times per day
    # Pin to a specific minor or patch when you want zero surprises:
    # image: docker.io/iuliandita/digarr:0.44
    # image: docker.io/iuliandita/digarr:0.44.0
    # Alpine variant (smaller image, musl libc):
    # image: docker.io/iuliandita/digarr:0.44.0-alpine
    user: "1000:1000"
    networks:
      - frontend
      - backend
    env_file:
      - path: .env
        required: false
    environment:
      - PORT=3000
      - DATABASE_URL_FILE=/run/secrets/database_url
    secrets:
      - database_url
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/app/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    read_only: true
    volumes:
      - backups:/app/backups
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
    networks:
      - backend
    env_file:
      - path: .env
        required: false
    environment:
      - POSTGRES_USER=${DB_USER:-digarr}
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
      - POSTGRES_DB=${DB_NAME:-digarr}
    secrets:
      - postgres_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-digarr}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
      - CHOWN
      - FOWNER
      - DAC_READ_SEARCH
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  pgdata:
  backups:
