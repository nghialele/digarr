replicaCount: 1

image:
  repository: ghcr.io/iuliandita/digarr
  tag: "0.30.5"
  # Pin the digest after publishing the release image. The digest comes from the published registry artifact.
  digest: "sha256:8b11c121319276c0f7c8fcfbbb6dccd8965d634203e87f9c067c1a6e7fa3996d"
  pullPolicy: Always

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  # Create a dedicated ServiceAccount with token automount disabled.
  # Set create=false and supply serviceAccount.name to reuse an existing one
  # (for example, one with IRSA / Workload Identity annotations).
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}

service:
  type: ClusterIP
  port: 3000

networkPolicy:
  enabled: true

# PodDisruptionBudget protects the app from voluntary evictions during
# node drains. Disabled by default because the chart ships replicaCount=1 --
# a PDB with minAvailable=1 at replicas=1 blocks every drain. The template
# also gates on replicaCount > 1, so flipping enabled=true without scaling
# up is a no-op.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1  # alternative to minAvailable

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: digarr.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: digarr-tls
  #   hosts:
  #     - digarr.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 1Gi

env:
  PORT: "3000"
  LOG_LEVEL: info

startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 5
  timeoutSeconds: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
# Option 1: Bundled PostgreSQL (postgresql.enabled = true)
#   Uses the official postgres:17-alpine image as a StatefulSet.
#   You MUST set postgresql.auth.password -- there is no default.
#
# Option 2: External database (postgresql.enabled = false)
#   Point database.host at your own PostgreSQL instance, cloud RDS,
#   CNPG cluster, etc. Or supply a pre-created Secret via
#   database.existingSecret with a DATABASE_URL key.
# ---------------------------------------------------------------------------

# Bundled PostgreSQL -- official postgres image, no Bitnami dependency
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
    pullPolicy: Always
  auth:
    username: digarr
    # password: ""  # REQUIRED -- helm install will fail without this
    database: digarr
  persistence:
    enabled: true
    size: 1Gi
    # storageClass: ""  # uses cluster default if unset
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 1Gi

# External database -- used when postgresql.enabled is false
database:
  host: ""
  port: 5432
  name: digarr
  user: digarr
  password: ""
  # Name of an existing Secret with key DATABASE_URL
  existingSecret: ""
