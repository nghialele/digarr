replicaCount: 1

image:
  repository: ghcr.io/iuliandita/digarr
  # Helm deployments should keep a digest pin for reproducibility; the verify-digest-sync
  # job in release.yml asserts k8s/helm/unraid digests match. If you prefer a floating
  # channel for clusters where reproducibility is not a goal, set tag: "stable" and remove
  # the digest line - :stable is promoted only after a release has been live >= 7 days
  # without a follow-up patch.
  tag: "1.0.0-rc.1"
  digest: "sha256:cdb25500e5646ca50635f0b08797a31b306bf1607e16deafd9ed4ae12104b51b"
  pullPolicy: Always

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Keep above the app shutdown deadline: 12s readiness drain + 30s hard stop.
terminationGracePeriodSeconds: 45

serviceAccount:
  # Create a dedicated ServiceAccount with token automount disabled.
  # Set create=false and supply serviceAccount.name to reuse an existing one
  # (for example, one with IRSA / Workload Identity annotations).
  create: true
  name: ""
  automountServiceAccountToken: false
  annotations: {}

service:
  type: ClusterIP
  port: 3000

networkPolicy:
  enabled: true

# PodDisruptionBudget protects the app from voluntary evictions during
# node drains. Disabled by default because the chart ships replicaCount=1 --
# a PDB with minAvailable=1 at replicas=1 blocks every drain. The template
# also gates on replicaCount > 1, so flipping enabled=true without scaling
# up is a no-op.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1  # alternative to minAvailable

ingress:
  enabled: false
  className: nginx
  # Namespace of the ingress controller. Used by the NetworkPolicy ingress
  # rule to allow traffic from this namespace only. The controller's
  # namespace must carry the `kubernetes.io/metadata.name` label
  # (automatic on Kubernetes >= 1.22).
  controllerNamespace: ingress-nginx
  annotations: {}
  hosts:
    - host: digarr.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: digarr-tls
  #   hosts:
  #     - digarr.example.com

resources:
  requests:
    cpu: 100m
    memory: 128Mi
    ephemeral-storage: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
    ephemeral-storage: 1Gi

env:
  PORT: "3000"
  LOG_LEVEL: info

# Extra environment variables appended to the deployment container.
# Use this for secrets like DIGARR_ENCRYPTION_KEY, OIDC_CLIENT_SECRET, etc.
# Each entry follows the Kubernetes envVar shape (name + value or valueFrom).
# Example:
#   extraEnv:
#     - name: DIGARR_ENCRYPTION_KEY
#       valueFrom:
#         secretKeyRef:
#           name: my-digarr-secret
#           key: encryption-key
extraEnv: []

# Extra envFrom sources appended to the deployment container. Useful for
# importing an entire secret or configmap of env vars in one block.
# Example:
#   extraEnvFrom:
#     - secretRef:
#         name: my-oidc-secret
extraEnvFrom: []

startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 5
  timeoutSeconds: 3

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 2

# ---------------------------------------------------------------------------
# Database
# ---------------------------------------------------------------------------
# Option 1: Bundled PostgreSQL (postgresql.enabled = true)
#   Uses the official postgres:17-alpine image as a StatefulSet.
#   You MUST set postgresql.auth.password -- there is no default.
#
# Option 2: External database (postgresql.enabled = false)
#   Point database.host at your own PostgreSQL instance, cloud RDS,
#   CNPG cluster, etc. Or supply a pre-created Secret via
#   database.existingSecret with a DATABASE_URL key.
# ---------------------------------------------------------------------------

# Bundled PostgreSQL -- official postgres image, no Bitnami dependency
postgresql:
  enabled: true
  image:
    repository: postgres
    tag: "17-alpine"
    digest: "sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609"
    pullPolicy: Always
  auth:
    username: digarr
    # password: ""  # REQUIRED -- helm install will fail without this
    database: digarr
  persistence:
    enabled: true
    size: 1Gi
    # storageClass: ""  # uses cluster default if unset
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
      ephemeral-storage: 256Mi
    limits:
      cpu: 250m
      memory: 256Mi
      ephemeral-storage: 1Gi

# External database -- used when postgresql.enabled is false
database:
  host: ""
  port: 5432
  name: digarr
  user: digarr
  password: ""
  # Name of an existing Secret with key DATABASE_URL
  existingSecret: ""

# ---------------------------------------------------------------------------
# Optional Namespace with Pod Security Admission labels
# ---------------------------------------------------------------------------
# When true the chart emits a Namespace object with the PSA `restricted`
# profile enforced. Use only when Helm installs the namespace (i.e. not
# when `helm install -n <ns> --create-namespace` is used with an existing
# namespace you already manage).
namespace:
  create: false
  labels: {}

# ---------------------------------------------------------------------------
# Optional Gateway API HTTPRoute (replaces Ingress on clusters running
# Gateway API controllers like Cilium, Traefik, Envoy Gateway, Istio).
# Ingress-NGINX reaches EOL in March 2026; this is the forward path.
# ---------------------------------------------------------------------------
gateway:
  enabled: false
  # Name of the parent Gateway resource. Required when enabled=true.
  gatewayName: ""
  # Optional: namespace of the parent Gateway. Leave empty for same-ns.
  gatewayNamespace: ""
  # Optional: listener sectionName on the parent Gateway.
  sectionName: ""
  # List of hostnames to match on. Empty list matches any.
  hostnames: []
  # - digarr.example.com

# ---------------------------------------------------------------------------
# Optional PVC for /app/backups
# ---------------------------------------------------------------------------
# Default is emptyDir -- backups live only for the pod lifetime. Enable
# persistence to survive pod restarts and cluster events.
backups:
  persistence:
    enabled: false
    size: 5Gi
    # storageClass: ""  # uses cluster default if unset
