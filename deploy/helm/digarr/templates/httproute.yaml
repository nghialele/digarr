{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "digarr.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "digarr.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ required "gateway.gatewayName is required when gateway.enabled=true" .Values.gateway.gatewayName }}
      {{- with .Values.gateway.gatewayNamespace }}
      namespace: {{ . }}
      {{- end }}
      {{- with .Values.gateway.sectionName }}
      sectionName: {{ . }}
      {{- end }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "digarr.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
