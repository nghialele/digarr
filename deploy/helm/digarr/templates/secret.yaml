{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "digarr.fullname" . }}-db
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "digarr.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  {{- $password := required "postgresql.auth.password is required -- set it with --set postgresql.auth.password=YOUR_PASSWORD" .Values.postgresql.auth.password }}
  POSTGRES_PASSWORD: {{ $password | quote }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.postgresql.auth.username $password (include "digarr.postgresHost" .) 5432 .Values.postgresql.auth.database | quote }}
  {{- else }}
  {{- $password := required "database.password is required when using an external database" .Values.database.password }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s:%d/%s" .Values.database.user $password .Values.database.host (int .Values.database.port) .Values.database.name | quote }}
  {{- end }}
{{- end }}
