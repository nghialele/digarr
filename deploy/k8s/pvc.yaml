# Digarr PersistentVolumeClaim for PostgreSQL data
# This is only needed if you run PostgreSQL in-cluster without an operator.
# For managed databases (RDS, Cloud SQL, etc.) skip this file entirely.
# Customize: storageClassName (remove to use default), storage size.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: digarr-pgdata
  namespace: digarr   # match your namespace
  labels:
    app: digarr
    component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  # storageClassName: standard   # uncomment and set to override default StorageClass
  resources:
    requests:
      storage: 1Gi   # increase for production
