# Digarr Deployment
# Customize: image tag, namespace, resource limits, and secret name.
# Create the db-secret first:
#   kubectl create secret generic digarr-db \
#     --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/digarr' \
#     -n digarr
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digarr
  namespace: digarr # change to your namespace
  labels:
    app: digarr
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: digarr
  template:
    metadata:
      labels:
        app: digarr
    spec:
      serviceAccountName: digarr
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: digarr
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Pin the digest after publishing each release image. The digest comes from the published registry artifact.
          image: ghcr.io/iuliandita/digarr@sha256:3e8356b45b05c3f4fb44e85eb61c4038ee52a2b897114f7a2ec0dcb3a984baae
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: digarr-db # name of your Secret
                  key: DATABASE_URL
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 2
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: backups
              mountPath: /app/backups
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
              ephemeral-storage: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
              ephemeral-storage: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
        - name: backups
          emptyDir: {}
