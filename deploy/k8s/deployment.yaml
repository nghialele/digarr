# Digarr Deployment
# Customize: image tag, namespace, resource limits, and secret name.
# Create the db-secret first:
#   kubectl create secret generic digarr-db \
#     --from-literal=DATABASE_URL='postgresql://user:pass@host:5432/digarr' \
#     -n digarr
apiVersion: apps/v1
kind: Deployment
metadata:
  name: digarr
  namespace: digarr   # change to your namespace
  labels:
    app: digarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: digarr
  template:
    metadata:
      labels:
        app: digarr
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: digarr
          securityContext:
            allowPrivilegeEscalation: false
          image: ghcr.io/iuliandita/digarr:0.12.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: LOG_LEVEL
              value: info
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: digarr-db   # name of your Secret
                  key: DATABASE_URL
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
