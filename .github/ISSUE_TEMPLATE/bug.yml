name: Bug Report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do we trigger this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Digarr version, deployment method
      placeholder: |
        - OS: Ubuntu 24.04
        - Browser: Firefox 126
        - Digarr: 0.19.2
        - Deploy: Docker Compose
    validations:
      required: false

  - type: checkboxes
    id: listening-sources
    attributes:
      label: Listening sources
      description: Which listening sources do you have connected?
      options:
        - label: ListenBrainz
        - label: Last.fm
        - label: Spotify
        - label: Plex
        - label: Jellyfin
        - label: Discogs

  - type: checkboxes
    id: targets
    attributes:
      label: Targets / integrations
      description: Which targets or integrations are you using?
      options:
        - label: Lidarr
        - label: Navidrome
        - label: Jellyfin playlists
        - label: Plex playlists
        - label: Spotify playlists
        - label: None (discovery only)

  - type: input
    id: ai-provider
    attributes:
      label: AI provider and model
      description: Which AI provider and model are you using for recommendations?
      placeholder: "e.g. Gemini / gemini-2.5-flash, Anthropic / claude-haiku, Ollama / llama3"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any error output here.
      render: text
