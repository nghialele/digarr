name: Bug Report
description: Something is broken
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How do we trigger this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: digarr-version
    attributes:
      label: Digarr version
      description: Visible in the footer of the web UI, or `package.json`.
      placeholder: "e.g. 0.32.3"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose
        - Docker (plain)
        - Helm (Kubernetes)
        - Kubernetes (raw manifests)
        - Bun (from source)
        - Other / custom
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Host OS
      description: OS and version of the machine running Digarr (or the K8s node).
      placeholder: "e.g. Ubuntu 24.04, Debian 12, CachyOS rolling, Talos 1.8"
    validations:
      required: true

  - type: input
    id: postgres-version
    attributes:
      label: Postgres version
      description: Run `SELECT version();` or check your image tag.
      placeholder: "e.g. 16.4, 17.2"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Only if the bug is in the web UI. Skip for backend-only issues.
      placeholder: "e.g. Firefox 126, Chrome 138, Safari 17"
    validations:
      required: false

  - type: checkboxes
    id: listening-sources
    attributes:
      label: Listening sources
      description: Which listening sources do you have connected?
      options:
        - label: ListenBrainz
        - label: Last.fm
        - label: Spotify
        - label: Deezer
        - label: Plex
        - label: Jellyfin
        - label: Emby
        - label: Discogs

  - type: checkboxes
    id: targets
    attributes:
      label: Targets / integrations
      description: Which targets or integrations are you using?
      options:
        - label: Lidarr
        - label: Navidrome
        - label: Jellyfin playlists
        - label: Plex playlists
        - label: Emby playlists
        - label: Spotify playlists
        - label: slskd
        - label: None (discovery only)

  - type: input
    id: ai-provider
    attributes:
      label: AI provider and model
      description: Which AI provider and model are you using for recommendations?
      placeholder: "e.g. Gemini / gemini-2.5-flash, Anthropic / claude-haiku, Ollama / llama3"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste any error output here.
      render: text
