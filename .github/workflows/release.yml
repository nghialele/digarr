name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.12.13)"
        required: true

# Workflow baseline is read-only. Jobs that need more (docker) escalate per-job.
permissions:
  contents: read

# Serialize releases on the same ref; never cancel a release mid-flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality-gate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.13"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run i18n:check
      - run: bun run test

  docker:
    runs-on: ubuntu-24.04
    needs: quality-gate
    environment: production
    permissions:
      contents: write
      packages: write
      id-token: write # cosign keyless signing via Sigstore OIDC
      attestations: write # actions/attest-build-provenance
    strategy:
      matrix:
        include:
          - variant: debian
            runtime-image: "oven/bun:1.3.13-slim@sha256:7e8ed3961db1cdedf17d516dda87948cfedbd294f53bf16462e5b57ed3fff0f1"
            suffix: ""
            latest: "auto"
          - variant: alpine
            runtime-image: "oven/bun:1.3.13-alpine@sha256:4de475389889577f346c636f956b42a5c31501b654664e9ae5726f94d7bb5349"
            suffix: "-alpine"
            latest: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if [[ ! "$INPUT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or v1.2.3-rc.0"
            exit 1
          fi

          echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          if [[ "$INPUT_TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker.io/iuliandita/digarr
          flavor: |
            suffix=${{ matrix.suffix }}
            latest=${{ matrix.latest }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.value }}
            type=raw,value=alpine,enable=${{ matrix.variant == 'alpine' && steps.tag.outputs.prerelease != 'true' }},suffix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNTIME_IMAGE=${{ matrix.runtime-image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance (GHCR)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest build provenance (Docker Hub)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: docker.io/iuliandita/digarr
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Sign images (cosign keyless)
        env:
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DOCKER_IMAGE: docker.io/iuliandita/digarr
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"
          cosign sign --yes "${DOCKER_IMAGE}@${DIGEST}"

      - name: Generate SBOM (container)
        if: matrix.variant == 'debian'
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.IMAGE_REF }}
          artifact-name: sbom-container.spdx.json
          output-file: sbom-container.spdx.json

      - name: Generate SBOM (source)
        if: matrix.variant == 'debian'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          artifact-name: sbom-source.spdx.json
          output-file: sbom-source.spdx.json

      - name: Attest SBOM (container) via cosign
        if: matrix.variant == 'debian'
        env:
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DOCKER_IMAGE: docker.io/iuliandita/digarr
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson --predicate sbom-container.spdx.json "${GHCR_IMAGE}@${DIGEST}"
          cosign attest --yes --type spdxjson --predicate sbom-container.spdx.json "${DOCKER_IMAGE}@${DIGEST}"

      - name: Ensure release exists and upload SBOMs
        if: matrix.variant == 'debian'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
          PRERELEASE: ${{ steps.tag.outputs.prerelease }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "release $TAG already exists; skipping create"
          else
            release_args=(gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes)
            if [ "$PRERELEASE" = "true" ]; then
              release_args+=(--prerelease)
            fi
            "${release_args[@]}"
          fi
          gh release upload "$TAG" sbom-container.spdx.json sbom-source.spdx.json --clobber

  verify-digest-sync:
    needs: docker
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
      - name: Assert deploy artefacts carry the same digest
        run: |
          k8s=$(grep -oE 'sha256:[a-f0-9]+' deploy/k8s/deployment.yaml | head -1)
          helm=$(grep -oE 'sha256:[a-f0-9]+' deploy/helm/digarr/values.yaml | head -1)
          unraid=$(grep -oE 'sha256:[a-f0-9]+' deploy/unraid/digarr.xml | head -1)
          if [ -z "$k8s" ] || [ -z "$helm" ] || [ -z "$unraid" ]; then
            echo "missing digest in one or more deploy files:"
            echo "  k8s=$k8s"
            echo "  helm=$helm"
            echo "  unraid=$unraid"
            exit 1
          fi
          if [ "$k8s" != "$helm" ] || [ "$k8s" != "$unraid" ]; then
            echo "digest drift detected:"
            echo "  k8s=$k8s"
            echo "  helm=$helm"
            echo "  unraid=$unraid"
            echo "Run: bun scripts/sync-deploy-digests.ts <tag>"
            exit 1
          fi
          echo "digests aligned: $k8s"
