name: Release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.12.13)"
        required: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.11"
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: bun-${{ runner.os }}-
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

  docker:
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: write
      packages: write
      id-token: write # cosign keyless signing via Sigstore OIDC
    strategy:
      matrix:
        include:
          - variant: debian
            runtime-image: "oven/bun:1.3.11-slim@sha256:478281fdd196871c7e51ba6a820b7803a8ae97042ec86cdbc2e1c6b6626442d9"
            suffix: ""
            latest: "auto"
          - variant: alpine
            runtime-image: "oven/bun:1.3.11-alpine@sha256:7ed9f74c326d1c260abe247ac423ccbf5ac92af62bb442d515d1f92f21e8ea9b"
            suffix: "-alpine"
            latest: "false"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Log in to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: echo "value=$INPUT_TAG" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            docker.io/iuliandita/digarr
          flavor: |
            suffix=${{ matrix.suffix }}
            latest=${{ matrix.latest }}
          tags: |
            type=semver,pattern={{version}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.tag.outputs.value }}
            type=semver,pattern={{major}},value=${{ steps.tag.outputs.value }}
            type=raw,value=alpine,enable=${{ matrix.variant == 'alpine' }},suffix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RUNTIME_IMAGE=${{ matrix.runtime-image }}

      - name: Sign images (cosign keyless)
        env:
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DOCKER_IMAGE: docker.io/iuliandita/digarr
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign sign --yes "${GHCR_IMAGE}@${DIGEST}"
          cosign sign --yes "${DOCKER_IMAGE}@${DIGEST}"

      - name: Generate SBOM (container)
        if: matrix.variant == 'debian'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          artifact-name: sbom-container.spdx.json
          output-file: sbom-container.spdx.json

      - name: Generate SBOM (source)
        if: matrix.variant == 'debian'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          artifact-name: sbom-source.spdx.json
          output-file: sbom-source.spdx.json

      - name: Attest SBOM (container) via cosign
        if: matrix.variant == 'debian'
        env:
          GHCR_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DOCKER_IMAGE: docker.io/iuliandita/digarr
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson --predicate sbom-container.spdx.json "${GHCR_IMAGE}@${DIGEST}"
          cosign attest --yes --type spdxjson --predicate sbom-container.spdx.json "${DOCKER_IMAGE}@${DIGEST}"

      - name: Ensure release exists and upload SBOMs
        if: matrix.variant == 'debian'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.value }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes 2>/dev/null || true
          gh release upload "$TAG" sbom-container.spdx.json sbom-source.spdx.json --clobber
