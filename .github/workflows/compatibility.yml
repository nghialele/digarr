name: Compatibility

on:
  pull_request:
    paths:
      - "deploy/docker/**"
      - ".github/workflows/compatibility.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: compat-${{ github.ref }}
  cancel-in-progress: true

jobs:
  podman:
    name: Podman (rootless)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install podman-compose
        run: pip install podman-compose

      - name: Prepare env
        run: |
          cp deploy/docker/.env.example deploy/docker/.env
          printf '%s\n' 'testpass123' > deploy/docker/secrets/postgres_password
          printf '%s\n' 'postgres://digarr:testpass123@postgres:5432/digarr' > deploy/docker/secrets/database_url

      - name: Start services
        working-directory: deploy/docker
        run: podman-compose -f docker-compose.yml -f docker-compose.compat.yml up -d --build

      - name: Wait for healthy app
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "App is healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to become healthy"
          podman-compose -f deploy/docker/docker-compose.yml logs
          exit 1

      - name: Tear down
        if: always()
        working-directory: deploy/docker
        run: podman-compose down -v

  docker-macos:
    name: Docker Desktop (macOS)
    runs-on: macos-15
    # Hosted macOS runners are flaky when booting Docker Desktop; keep the
    # signal visible in PRs and scheduled runs without blocking merges.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Docker
        run: |
          brew install --cask docker
          open /Applications/Docker.app
          # Docker Desktop on macOS runners can take 3+ minutes to initialize
          for i in $(seq 1 90); do
            if docker info > /dev/null 2>&1; then
              echo "Docker ready after $((i * 2))s"
              break
            fi
            sleep 2
          done
          docker info > /dev/null 2>&1 || { echo "Docker failed to start"; exit 1; }

      - name: Prepare env
        run: |
          cp deploy/docker/.env.example deploy/docker/.env
          printf '%s\n' 'testpass123' > deploy/docker/secrets/postgres_password
          printf '%s\n' 'postgres://digarr:testpass123@postgres:5432/digarr' > deploy/docker/secrets/database_url

      - name: Start services
        working-directory: deploy/docker
        run: docker compose -f docker-compose.yml -f docker-compose.compat.yml up -d --build

      - name: Wait for healthy app
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "App is healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to become healthy"
          docker compose -f deploy/docker/docker-compose.yml logs
          exit 1

      - name: Tear down
        if: always()
        working-directory: deploy/docker
        run: docker compose down -v 2>/dev/null || true
