version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    # Bump the package.json range to the new version (floor tracks latest)
    # rather than only widening it.
    versioning-strategy: increase
    groups:
      production:
        patterns:
          - "hono"
          - "@hono/*"
          - "drizzle-*"
          - "pg"
          - "@anthropic-ai/*"
          - "openai"
          - "p-queue"
          - "p-retry"
          - "croner"
          - "openid-client"
          - "zod"
      dev-tools:
        # No update-types filter: majors are grouped too, not suppressed.
        patterns:
          - "typescript"
          - "vite"
          - "vitest"
          - "@vitest/*"
          - "@biomejs/*"
          - "drizzle-kit"
          - "@vitejs/*"
          - "@types/bun"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react*"
          - "@tanstack/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "@playwright/*"
          - "@axe-core/*"
          - "jsdom"
      frontend:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "lucide-react"
          - "sonner"
          - "clsx"
          - "class-variance-authority"
          - "tailwind-merge"
      # Catch-all so nothing falls through to noisy individual PRs.
      misc:
        patterns:
          - "*"

  - package-ecosystem: docker
    # Only scans Dockerfiles/compose here. Bun version strings and the
    # postgres service-image digests in the CI workflows are NOT covered by
    # any updater and must be bumped manually (same as the .forgejo mirror).
    directory: /deploy/docker
    schedule:
      interval: daily
    groups:
      docker-images:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    groups:
      github-actions:
        patterns:
          - "*"
