version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      production:
        patterns:
          - "hono"
          - "drizzle-*"
          - "pg"
          - "@anthropic-ai/*"
          - "openai"
          - "p-queue"
          - "croner"
          - "@hono/*"
          - "openid-client"
      dev-tools:
        patterns:
          - "typescript"
          - "vite"
          - "vitest"
          - "@biomejs/*"
          - "drizzle-kit"
          - "@vitejs/*"
          - "@types/bun"
        update-types:
          - minor
          - patch
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"
          - "@types/react*"
          - "@tanstack/*"
      testing:
        patterns:
          - "@testing-library/*"
          - "jsdom"
      frontend:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: docker
    directory: /deploy/docker
    schedule:
      interval: daily

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
