name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.12@sha256:8956c7667fa17beb6e3c664115e66bdacfe502da5d99603626e74c197bdef160
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run i18n:check
      - run: bun run test

  build:
    runs-on: docker
    container:
      image: oven/bun:1.3.12@sha256:8956c7667fa17beb6e3c664115e66bdacfe502da5d99603626e74c197bdef160
    needs: lint-typecheck-test
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run build

  api-route-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.12@sha256:8956c7667fa17beb6e3c664115e66bdacfe502da5d99603626e74c197bdef160
    needs: build
    services:
      postgres:
        image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Run API route contract tests
        run: bun run test:api-routes
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test

  browser-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.12@sha256:8956c7667fa17beb6e3c664115e66bdacfe502da5d99603626e74c197bdef160
    needs: api-route-test
    services:
      postgres:
        image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Install Playwright
        run: bunx playwright install --with-deps chromium
      - name: Start browser test servers
        run: |
          bun run tests/e2e/browser/start-backend.ts > /tmp/digarr-backend.log 2>&1 &
          bun run dev:web > /tmp/digarr-frontend.log 2>&1 &

          for _ in $(seq 1 120); do
            if bun -e "const backend = await fetch('http://127.0.0.1:3000/health').catch(() => null); const frontend = await fetch('http://127.0.0.1:5173').catch(() => null); if (backend?.ok && frontend?.ok) process.exit(0); process.exit(1);"; then
              exit 0
            fi
            sleep 2
          done

          cat /tmp/digarr-backend.log || true
          cat /tmp/digarr-frontend.log || true
          exit 1
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test
      - name: Run browser E2E tests
        run: |
          PLAYWRIGHT_SKIP_WEBSERVER=1 bun run test:e2e || {
            cat /tmp/digarr-backend.log || true
            cat /tmp/digarr-frontend.log || true
            exit 1
          }
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test
