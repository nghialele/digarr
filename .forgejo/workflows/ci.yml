name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.11@sha256:0733e50325078969732ebe3b15ce4c4be5082f18c4ac1a0f0ca4839c2e4e42a7
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run i18n:check
      - run: bun run test

  build:
    runs-on: docker
    container:
      image: oven/bun:1.3.11@sha256:0733e50325078969732ebe3b15ce4c4be5082f18c4ac1a0f0ca4839c2e4e42a7
    needs: lint-typecheck-test
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run build

  api-route-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.11@sha256:0733e50325078969732ebe3b15ce4c4be5082f18c4ac1a0f0ca4839c2e4e42a7
    needs: build
    services:
      postgres:
        image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Run API route contract tests
        run: bun run test:api-routes
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test

  browser-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.11@sha256:0733e50325078969732ebe3b15ce4c4be5082f18c4ac1a0f0ca4839c2e4e42a7
    needs: api-route-test
    services:
      postgres:
        image: postgres:17-alpine@sha256:6f30057d31f5861b66f3545d4821f987aacf1dd920765f0acadea0c58ff975b1
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Install Playwright
        run: bunx playwright install --with-deps chromium
      - name: Run browser E2E tests
        run: bun run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test
