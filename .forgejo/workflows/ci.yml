name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.11
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

  build:
    runs-on: docker
    container:
      image: oven/bun:1.3.11
    needs: lint-typecheck-test
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run build

  api-route-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.11
    needs: build
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Run API route contract tests
        run: bun run test:api-routes
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test

  browser-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.11
    needs: api-route-test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Install Playwright
        run: bunx playwright install --with-deps chromium
      - name: Run browser E2E tests
        run: bun run test:e2e
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test
