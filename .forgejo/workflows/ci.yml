# Mirror of .github/workflows/ci.yml. Forgejo runs CI only; releases live on
# GitHub. Action SHAs below MUST stay in sync with their counterparts in the
# GitHub workflow -- Dependabot only updates `.github/`, so manual sync is
# required when bumping the GitHub side. Use the job-name annotations on each
# `uses:` line below to find the matching GitHub step.
name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

jobs:
  # Fail-closed gate for fork PRs. The primary control is the Forgejo repo
  # setting "Require approval for first-time contributors"; this job is
  # defense-in-depth + visibly logged. Step-level `if:` ensures the job runs
  # trivially on push events so downstream `needs: guard` chains cleanly.
  guard:
    runs-on: docker
    # Reuse the pinned bun image already warm on the runner cache -- cheap and
    # avoids juggling an extra digest in the mirror policy comment.
    container:
      image: oven/bun:1.3.14@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    steps:
      - name: Reject fork PRs until approved
        if: github.event_name == 'pull_request'
        env:
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          REPO: ${{ github.repository }}
        run: |
          set -eu
          if [ "$HEAD_REPO" != "$REPO" ]; then
            echo "Fork PR from $HEAD_REPO - CI blocked."
            echo "Fork runs must be approved in Forgejo repo settings."
            exit 1
          fi

  lint-typecheck-test:
    needs: guard
    runs-on: docker
    container:
      image: oven/bun:1.3.14@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null && rm -rf /var/lib/apt/lists/*
      # mirror: .github/workflows/ci.yml `lint-typecheck-test` -> actions/checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run i18n:check
      - run: bun run test

  build:
    runs-on: docker
    container:
      image: oven/bun:1.3.14@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    needs: lint-typecheck-test
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null && rm -rf /var/lib/apt/lists/*
      # mirror: .github/workflows/ci.yml `build` -> actions/checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run build

  api-route-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.14@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    needs: build
    services:
      postgres:
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null && rm -rf /var/lib/apt/lists/*
      # mirror: .github/workflows/ci.yml `api-route-test` -> actions/checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Run API route contract tests
        run: bun run test:api-routes
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test

  helm-drift:
    needs: guard
    runs-on: docker
    container:
      image: oven/bun:1.3.14@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    env:
      HELM_VERSION: v3.16.4
      HELM_SHA256: fc307327959aa38ed8f9f7e66d45492bb022a66c3e5da6063958254b9767d179
    steps:
      - name: Install git and curl
        run: apt-get update -qq && apt-get install -y -qq git curl ca-certificates > /dev/null && rm -rf /var/lib/apt/lists/*
      - name: Install Helm
        run: |
          set -euo pipefail
          curl -fsSLo /tmp/helm.tgz "https://get.helm.sh/helm-${HELM_VERSION}-linux-amd64.tar.gz"
          echo "${HELM_SHA256}  /tmp/helm.tgz" | sha256sum -c -
          tar -xzf /tmp/helm.tgz -C /tmp
          install -m 0755 /tmp/linux-amd64/helm /usr/local/bin/helm
          helm version --short
      # mirror: .github/workflows/ci.yml `helm-drift` -> actions/checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1
      - name: Lint Helm chart
        run: helm lint deploy/helm/digarr --set postgresql.auth.password=lint
      - name: Verify deploy/k8s/rendered.yaml is in sync with chart
        run: |
          ./scripts/k8s-sync.sh
          if ! git diff --exit-code -- deploy/k8s/rendered.yaml; then
            echo "deploy/k8s/rendered.yaml is out of date. Run scripts/k8s-sync.sh locally and commit the result."
            exit 1
          fi

  browser-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.14@sha256:e10577f0db68676a7024391c6e5cb4b879ebd17188ab750cf10024a6d700e5c4
    needs: api-route-test
    services:
      postgres:
        image: postgres:17-alpine@sha256:c7526c0f6c3f30260a563d7bcf8ad778effac59a44f8ffa86678c35418338609
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: digarr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null && rm -rf /var/lib/apt/lists/*
      # mirror: .github/workflows/ci.yml `browser-test` -> actions/checkout
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - name: Install Playwright
        run: bunx playwright install --with-deps chromium
      - name: Start browser test servers
        run: |
          bun run tests/e2e/browser/start-backend.ts > /tmp/digarr-backend.log 2>&1 &
          bun run dev:web > /tmp/digarr-frontend.log 2>&1 &

          for _ in $(seq 1 120); do
            if bun -e "const backend = await fetch('http://127.0.0.1:3000/health').catch(() => null); const frontend = await fetch('http://127.0.0.1:5173').catch(() => null); if (backend?.ok && frontend?.ok) process.exit(0); process.exit(1);"; then
              exit 0
            fi
            sleep 2
          done

          cat /tmp/digarr-backend.log || true
          cat /tmp/digarr-frontend.log || true
          exit 1
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test
      - name: Run browser E2E tests
        run: |
          PLAYWRIGHT_SKIP_WEBSERVER=1 bun run test:e2e || {
            cat /tmp/digarr-backend.log || true
            cat /tmp/digarr-frontend.log || true
            exit 1
          }
        env:
          DATABASE_URL: postgresql://test:test@postgres:5432/digarr_test
