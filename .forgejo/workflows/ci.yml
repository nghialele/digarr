name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-typecheck-test:
    runs-on: docker
    container:
      image: oven/bun:1.3.11
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: bun run typecheck
      - run: bun run test

  build:
    runs-on: docker
    container:
      image: oven/bun:1.3.11
    needs: lint-typecheck-test
    steps:
      - name: Install git
        run: apt-get update -qq && apt-get install -y -qq git > /dev/null
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1
      - run: bun install --frozen-lockfile
      - run: bun run build
